<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1c140d">
<title>Embervale 3D — Ashford</title>
<style>
  :root{ --edge:#6b4f2e; --edge2:#8a6638; --ember:#f0a749; --ember-soft:#ffcf7a; --ink:#ecdcc0; --ink-dim:#b39d7e; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{margin:0;height:100%;overflow:hidden;background:#0e0a07;font-family:system-ui,sans-serif;color:var(--ink);}
  #scene{position:fixed;inset:0;touch-action:none;}
  #scene canvas{touch-action:none;display:block;}
  #hud{position:fixed;top:0;left:0;right:0;padding:10px 12px;display:flex;gap:10px;align-items:flex-start;pointer-events:none;z-index:5;flex-wrap:wrap;}
  .plate{background:linear-gradient(180deg,#2f2218,#1f160f);border:1px solid var(--edge);border-radius:10px;padding:7px 11px;box-shadow:0 2px 0 #120c08;}
  #hpwrap{min-width:150px}
  .hp-label{font-size:11px;letter-spacing:.08em;color:var(--ink-dim);text-transform:uppercase;margin-bottom:4px}
  .hp-bar{height:14px;border-radius:7px;background:#3a2018;overflow:hidden;border:1px solid #4a2c20;position:relative}
  .hp-fill{height:100%;background:linear-gradient(180deg,#ef6a4f,#b13a26);width:100%;transition:width .25s}
  .hp-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;text-shadow:0 1px 2px #000}
  #coins{display:flex;align-items:center;gap:7px;font-weight:600}
  .coin-dot{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffe9a8,#e0a23a 60%,#a9701d);border:1px solid #7a5113}
  #weap{font-size:12px;color:var(--ink-dim)} #weap b{color:var(--ember-soft);font-weight:600}
  #zone{position:fixed;top:38%;left:0;right:0;text-align:center;z-index:6;pointer-events:none;font-family:Georgia,serif;opacity:0;transition:opacity .6s}
  #zone .t{font-size:40px;color:var(--ember-soft);text-shadow:0 3px 18px rgba(0,0,0,.8)}
  #zone .s{font-size:14px;color:var(--ink);letter-spacing:.18em;text-transform:uppercase;margin-top:4px}
  #toasts{position:fixed;left:0;right:0;bottom:150px;display:flex;flex-direction:column;align-items:center;gap:6px;z-index:7;pointer-events:none}
  .toast{background:rgba(28,20,13,.92);border:1px solid var(--edge);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600}
  /* camera control cluster */
  #cam{position:fixed;right:10px;bottom:150px;z-index:7;display:grid;grid-template-columns:repeat(3,40px);grid-auto-rows:40px;gap:6px;}
  .cbtn{background:linear-gradient(180deg,#33271b,#1f160f);border:1px solid var(--edge);border-radius:10px;color:var(--ember-soft);font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .cbtn:active{background:#3a2c1f}
  #bar{position:fixed;left:0;right:0;bottom:0;z-index:8;display:flex;gap:5px;padding:8px;padding-bottom:calc(8px + env(safe-area-inset-bottom));background:linear-gradient(0deg,#160f0a,rgba(22,15,10,0));}
  .tab{flex:1;background:linear-gradient(180deg,#33271b,#211710);border:1px solid var(--edge);border-radius:11px;color:var(--ink);padding:11px 2px;font-size:11px;font-weight:600;cursor:pointer;text-align:center}
  .tab.on{border-color:var(--ember);color:var(--ember-soft)}
  #panel{position:fixed;left:8px;right:8px;bottom:74px;max-height:60vh;z-index:9;background:linear-gradient(180deg,#2a1f15,#1d150e);border:1px solid var(--edge2);border-radius:16px;box-shadow:0 -6px 30px rgba(0,0,0,.5);display:none;flex-direction:column;overflow:hidden}
  #panel.open{display:flex}
  .phead{font-family:Georgia,serif;font-size:18px;color:var(--ember-soft);padding:12px 16px 6px;border-bottom:1px solid #3a2c1f;display:flex;justify-content:space-between;align-items:center}
  .phead .hint{font-family:system-ui;font-size:11px;color:var(--ink-dim);font-weight:400}
  .pbody{overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
  .row{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid #2a2016}
  .dot{width:18px;height:18px;border-radius:5px;flex:none}
  .nm{flex:1;font-size:13px;font-weight:600}
  .qty{color:#ffe9a8;font-weight:700} .lv{color:var(--ember-soft);font-weight:700}
  .skbar{height:6px;border-radius:3px;background:#1a120c;margin-top:4px;overflow:hidden;border:1px solid #2a2016;flex-basis:100%}
  .skbar i{display:block;height:100%;background:linear-gradient(90deg,#c98326,#ffcf7a)}
  .fbtn{margin-left:auto;border:1px solid var(--edge);background:linear-gradient(180deg,#3a2c1f,#241a12);color:var(--ember-soft);border-radius:9px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer}
  .fbtn:disabled{opacity:.4;color:var(--ink-dim)}
  .cost{font-size:11px;color:var(--ink-dim)}
  .mhead{font-family:Georgia,serif;font-size:13px;color:var(--ember-soft);margin:10px 2px 4px;border-bottom:1px solid #3a2c1f;padding-bottom:3px}
  select,input[type=file]{background:#1a120c;color:var(--ink);border:1px solid var(--edge);border-radius:8px;padding:7px;font-size:12px;width:100%}
  .srow{display:flex;align-items:center;gap:10px;padding:9px 4px}
  .srow label{font-size:12px;color:var(--ink-dim);width:96px}
  .srow input[type=range]{flex:1}
  .srow .val{font-size:12px;color:var(--ember-soft);width:42px;text-align:right}
  .tog{margin-left:auto;border:1px solid var(--edge);border-radius:9px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;color:var(--ember-soft);background:#241a12}
  .help{font-size:13px;line-height:1.6} .help b{color:var(--ember-soft)} .help ul{padding-left:18px}
  #loaderNote{font-size:12px;color:#e0a06a;margin-top:8px}
</style>
</head>
<body>
<div id="scene"></div>
<div id="hud">
  <div class="plate" id="hpwrap"><div class="hp-label">Vitality</div><div class="hp-bar"><div class="hp-fill" id="hpFill"></div><div class="hp-num" id="hpNum">150 / 150</div></div></div>
  <div class="plate" id="coins"><span class="coin-dot"></span><span id="coinNum">0</span></div>
  <div class="plate" id="weap">Wielding: <b id="weapName">unarmed</b></div>
</div>
<div id="zone"><div class="t">Ashford</div><div class="s">Hearthlands · 3D</div></div>
<div id="toasts"></div>
<div id="cam">
  <div class="cbtn" id="cRotL">⟲</div><div class="cbtn" id="cUp">▲</div><div class="cbtn" id="cRotR">⟳</div>
  <div class="cbtn" id="cZoomIn">+</div><div class="cbtn" id="cReset">⊙</div><div class="cbtn" id="cZoomOut">−</div>
  <div class="cbtn" id="cDown" style="grid-column:2">▼</div>
</div>
<div id="panel"><div class="phead"><span id="pTitle">Pack</span><span class="hint" id="pHint"></span></div><div class="pbody" id="pBody"></div></div>
<div id="bar">
  <div class="tab" data-tab="pack">Pack</div>
  <div class="tab" data-tab="skills">Skills</div>
  <div class="tab" data-tab="camera">Camera</div>
  <div class="tab" data-tab="models">Models</div>
  <div class="tab" data-tab="help">Guide</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
"use strict";
// ====== EDIT THIS to auto-load your real models once hosted (GitHub Pages) ======
// Example: tree:'./models/tree.glb'  (paths relative to where this HTML is hosted)
const MODEL_URLS = { tree:'', darktree:'', rock:'', furnace:'', anvil:'', mob:'', wolf:'', npc:'', player:'', stall:'', wayshrine:'', house:'' };
const TARGET_H   = { tree:3.6, darktree:4.0, rock:1.3, furnace:2.0, anvil:1.0, mob:1.3, wolf:0.9, npc:1.8, player:1.8, stall:1.9, wayshrine:2.0, house:2.3 };
// ===============================================================================
if(!window.THREE){ document.getElementById('scene').innerHTML='<div style="padding:40px;color:#e0a06a">three.js failed to load — open with an internet connection.</div>'; }
else boot();
function boot(){
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const W=()=>window.innerWidth, H=()=>window.innerHeight;
const scene=new THREE.Scene(); scene.background=new THREE.Color('#e3c489'); scene.fog=new THREE.Fog('#d8b878',30,72);
const renderer=new THREE.WebGLRenderer({antialias:true}); renderer.setSize(W(),H()); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap; if(THREE.sRGBEncoding) renderer.outputEncoding=THREE.sRGBEncoding;
const dom=renderer.domElement; dom.style.touchAction='none'; document.getElementById('scene').appendChild(dom);

const cam=new THREE.PerspectiveCamera(50, W()/H(), 0.1, 400);
const camCtl={ yaw:0.7, pitch:0.95, dist:24, target:new THREE.Vector3(0,1,0), follow:true, sens:0.006,
  minDist:7, maxDist:52, minPitch:0.22, maxPitch:1.45, def:{yaw:0.7,pitch:0.95,dist:24} };
function updateCam(){ if(camCtl.follow) camCtl.target.lerp(new THREE.Vector3(player.pos.x,1,player.pos.z),0.15);
  const d=camCtl.dist,cp=camCtl.pitch,cy=camCtl.yaw;
  cam.position.set(camCtl.target.x+d*Math.cos(cp)*Math.sin(cy), camCtl.target.y+d*Math.sin(cp), camCtl.target.z+d*Math.cos(cp)*Math.cos(cy));
  cam.lookAt(camCtl.target); }
function rotate(dy,dp){ camCtl.yaw+=dy; camCtl.pitch=clamp(camCtl.pitch+dp,camCtl.minPitch,camCtl.maxPitch); if(panelTab==='camera')syncCamUI(); }
function zoom(dd){ camCtl.dist=clamp(camCtl.dist+dd,camCtl.minDist,camCtl.maxDist); if(panelTab==='camera')syncCamUI(); }
function resetCam(){ camCtl.yaw=camCtl.def.yaw; camCtl.pitch=camCtl.def.pitch; camCtl.dist=camCtl.def.dist; if(panelTab==='camera')syncCamUI(); }

const hemi=new THREE.HemisphereLight('#fff0d0','#6a5a3a',0.85); scene.add(hemi);
const sun=new THREE.DirectionalLight('#ffe6b0',1.05); sun.position.set(16,24,10); sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024); Object.assign(sun.shadow.camera,{left:-34,right:34,top:34,bottom:-34,near:1,far:90}); scene.add(sun);

const groundMat=new THREE.MeshLambertMaterial({color:'#79a052'});
const ground=new THREE.Mesh(new THREE.PlaneGeometry(220,80), groundMat); ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);
const dirt=new THREE.Mesh(new THREE.CircleGeometry(7,24), new THREE.MeshLambertMaterial({color:'#b0894f'})); dirt.rotation.x=-Math.PI/2; dirt.position.set(0,0.01,2); dirt.receiveShadow=true; scene.add(dirt);
const pond=new THREE.Mesh(new THREE.CircleGeometry(4,28), new THREE.MeshLambertMaterial({color:'#3f86a0'})); pond.rotation.x=-Math.PI/2; pond.position.set(-12,0.02,10); scene.add(pond);
// the King's Road — Ashford (0) west to Greenveil (-52), east to Havenport (52)
const road=new THREE.Mesh(new THREE.BoxGeometry(116,0.04,3.2), new THREE.MeshLambertMaterial({color:'#a8824e'})); road.position.set(0,0.02,0); road.receiveShadow=true; scene.add(road);
for(const rx of [-44,-22,22,44]){ const patch=new THREE.Mesh(new THREE.PlaneGeometry(6,3.4), new THREE.MeshLambertMaterial({color:'#9c7a48'})); patch.rotation.x=-Math.PI/2; patch.position.set(rx,0.025,0); scene.add(patch); }
// sun follows the player so shadows stay correct across the whole map
const sunOffset=new THREE.Vector3(16,24,10); scene.add(sun.target);
// region ambience — blended by player x, no loading zones
const AMBIENCE=[
  {x:-52, name:'Greenveil', sub:'Deepwood', bg:'#3c4a3c', fog:'#33402f', skyC:'#aebf9c', groundC:'#2d3a29', sunC:'#bcd0ff', sunI:0.55},
  {x:0,   name:'Ashford',   sub:'Hearthlands', bg:'#e3c489', fog:'#d8b878', skyC:'#fff0d0', groundC:'#6a5a3a', sunC:'#ffe6b0', sunI:1.05},
  {x:52,  name:'Havenport', sub:'Borderlands', bg:'#cdbb8a', fog:'#c2af7e', skyC:'#fdeccb', groundC:'#766148', sunC:'#fff0c8', sunI:1.0},
];
const _c=()=>new THREE.Color();
function lerpColor(a,b,t){ return _c().set(a).lerp(_c().set(b),t); }
function updateAmbience(x){
  let lo=AMBIENCE[0], hi=AMBIENCE[AMBIENCE.length-1];
  for(let i=0;i<AMBIENCE.length-1;i++){ if(x>=AMBIENCE[i].x && x<=AMBIENCE[i+1].x){ lo=AMBIENCE[i]; hi=AMBIENCE[i+1]; break; } if(x<AMBIENCE[0].x){lo=hi=AMBIENCE[0];} if(x>AMBIENCE[AMBIENCE.length-1].x){lo=hi=AMBIENCE[AMBIENCE.length-1];} }
  const t=hi.x===lo.x?0:clamp((x-lo.x)/(hi.x-lo.x),0,1);
  scene.background=lerpColor(lo.bg,hi.bg,t); scene.fog.color=lerpColor(lo.fog,hi.fog,t);
  hemi.color=lerpColor(lo.skyC,hi.skyC,t); hemi.groundColor=lerpColor(lo.groundC,hi.groundC,t);
  sun.color=lerpColor(lo.sunC,hi.sunC,t); sun.intensity=lo.sunI+(hi.sunI-lo.sunI)*t;
}
function regionAt(x){ if(x<=-26) return AMBIENCE[0]; if(x>=26) return AMBIENCE[2]; return AMBIENCE[1]; }
let currentRegion=AMBIENCE[1];
function showZoneBanner(name,sub){ const t=zoneEl.querySelector('.t'), s=zoneEl.querySelector('.s'); t.textContent=name; s.textContent=sub; zoneEl.style.opacity='1'; clearTimeout(zoneEl._hideT); zoneEl._hideT=setTimeout(()=>{zoneEl.style.opacity='0';},2600); }

const GLTF=THREE.GLTFLoader?new THREE.GLTFLoader():null;

function mat(c){return new THREE.MeshLambertMaterial({color:c});}
function ms(m){m.castShadow=true;m.receiveShadow=true;return m;}
function buildTree(){const g=new THREE.Group();const t=ms(new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.26,1.4,6),mat('#6a4426')));t.position.y=0.7;g.add(t);const c=ms(new THREE.Mesh(new THREE.ConeGeometry(1.2,2.2,7),mat('#3f6b34')));c.position.y=2.2;g.add(c);const c2=ms(new THREE.Mesh(new THREE.ConeGeometry(0.9,1.5,7),mat('#4f8040')));c2.position.y=3.1;g.add(c2);return g;}
function buildRock(color){const g=new THREE.Group();const r=ms(new THREE.Mesh(new THREE.DodecahedronGeometry(0.8),mat('#6e6a68')));r.position.y=0.6;r.scale.set(1,0.8,1);g.add(r);for(let i=0;i<3;i++){const o=ms(new THREE.Mesh(new THREE.IcosahedronGeometry(0.16),mat(color)));o.position.set((Math.random()-.5)*0.9,0.5+Math.random()*0.5,(Math.random()-.5)*0.9);g.add(o);}return g;}
function buildFurnace(){const g=new THREE.Group();const b=ms(new THREE.Mesh(new THREE.BoxGeometry(1.6,1.8,1.4),mat('#54504c')));b.position.y=0.9;g.add(b);const glow=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.7,0.2),new THREE.MeshBasicMaterial({color:'#ff8a3a'}));glow.position.set(0,0.7,0.75);g.add(glow);return g;}
function buildAnvil(){const g=new THREE.Group();const base=ms(new THREE.Mesh(new THREE.BoxGeometry(0.5,0.6,0.5),mat('#3a3633')));base.position.y=0.3;g.add(base);const top=ms(new THREE.Mesh(new THREE.BoxGeometry(1.2,0.3,0.5),mat('#46423e')));top.position.y=0.75;g.add(top);return g;}
function buildAshrat(brute){const s=brute?1.5:1;const g=new THREE.Group();const c=brute?'#9a5e52':'#d98a78';const body=ms(new THREE.Mesh(new THREE.SphereGeometry(0.5*s,10,8),mat(c)));body.position.y=0.45*s;body.scale.set(1.3,0.9,1);g.add(body);const head=ms(new THREE.Mesh(new THREE.SphereGeometry(0.32*s,10,8),mat(c)));head.position.set(0.55*s,0.6*s,0);g.add(head);const tail=ms(new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.02,0.9*s,5),mat(c)));tail.position.set(-0.6*s,0.4*s,0);tail.rotation.z=Math.PI/2.4;g.add(tail);return g;}
function buildNpc(){const g=new THREE.Group();const body=ms(new THREE.Mesh(new THREE.CylinderGeometry(0.32,0.42,1.1,7),mat('#5b6e4a')));body.position.y=0.55;g.add(body);const head=ms(new THREE.Mesh(new THREE.SphereGeometry(0.28,10,8),mat('#e0c39a')));head.position.y=1.3;g.add(head);return g;}
function buildPlayer(){const g=new THREE.Group();const body=ms(new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,1.1,7),mat('#3a6ea5')));body.position.y=0.55;g.add(body);const head=ms(new THREE.Mesh(new THREE.SphereGeometry(0.27,10,8),mat('#e8c79a')));head.position.y=1.3;g.add(head);return g;}
function buildStall(){const g=new THREE.Group();const base=ms(new THREE.Mesh(new THREE.BoxGeometry(2.4,0.7,1.4),mat('#7a4f29')));base.position.y=0.35;g.add(base);
  const roof=ms(new THREE.Mesh(new THREE.ConeGeometry(1.9,1.1,4),mat('#b23b2e')));roof.position.y=1.55;roof.rotation.y=Math.PI/4;g.add(roof);
  for(let i=-1;i<2;i+=2){const post=ms(new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,1.1,6),mat('#5a3a1e')));post.position.set(i*1.0,0.9,0.5);g.add(post);}return g;}
function buildWayshrine(){const g=new THREE.Group();for(const dx of [-0.6,0.6]){const p=ms(new THREE.Mesh(new THREE.BoxGeometry(0.3,1.8,0.3),mat('#5a6b8a')));p.position.set(dx,0.9,0);g.add(p);}
  const lintel=ms(new THREE.Mesh(new THREE.BoxGeometry(1.6,0.35,0.35),mat('#46557a')));lintel.position.y=1.8;g.add(lintel);
  const glow=new THREE.Mesh(new THREE.OctahedronGeometry(0.32),new THREE.MeshBasicMaterial({color:'#9db6ff',transparent:true,opacity:0.85}));glow.position.y=1.0;g.add(glow);g.userData.glow=glow;return g;}
function buildHouse(roofColor,wallColor){const g=new THREE.Group();const w=ms(new THREE.Mesh(new THREE.BoxGeometry(2.6,1.7,2.2),mat(wallColor||'#cdbb95')));w.position.y=0.85;g.add(w);
  const r=ms(new THREE.Mesh(new THREE.ConeGeometry(2.0,1.2,4),mat(roofColor||'#7a3b2c')));r.position.y=2.3;r.rotation.y=Math.PI/4;g.add(r);return g;}
function buildDarkTree(){const g=new THREE.Group();const t=ms(new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.3,1.7,6),mat('#382a1e')));t.position.y=0.85;g.add(t);
  const c=ms(new THREE.Mesh(new THREE.ConeGeometry(1.3,2.6,7),mat('#1f3a22')));c.position.y=2.7;g.add(c);const c2=ms(new THREE.Mesh(new THREE.ConeGeometry(1.0,1.7,7),mat('#274d2b')));c2.position.y=3.7;g.add(c2);return g;}
function buildWolf(){const g=new THREE.Group();const body=ms(new THREE.Mesh(new THREE.BoxGeometry(1.1,0.55,0.5),mat('#4a4f57')));body.position.y=0.5;g.add(body);
  const head=ms(new THREE.Mesh(new THREE.BoxGeometry(0.4,0.4,0.4),mat('#3a3e45')));head.position.set(0.7,0.62,0);g.add(head);
  for(const dx of [-0.4,0.4])for(const dz of [-0.18,0.18]){const leg=ms(new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,0.45,5),mat('#33363c')));leg.position.set(dx,0.22,dz);g.add(leg);}
  const ear=ms(new THREE.Mesh(new THREE.ConeGeometry(0.1,0.2,4),mat('#2a2d33')));ear.position.set(0.78,0.88,0);g.add(ear);return g;}

const XP=(()=>{let raw=[0,0],p=0;for(let l=1;l<100;l++){p+=Math.floor(l+300*Math.pow(2,l/7));raw[l+1]=Math.floor(p/4);}const s=5000000/raw[100];return raw.map(v=>Math.round(v*s));})();
function levelFromXp(x){let l=1;for(let i=2;i<=100;i++){if(x>=XP[i])l=i;else break;}return l;}
function xpProg(x){const l=levelFromXp(x);if(l>=100)return 1;return clamp((x-XP[l])/(XP[l+1]-XP[l]),0,1);}
const SKILLS={forestry:{xp:0,label:'Forestry'},prospecting:{xp:0,label:'Prospecting'},blacksmithing:{xp:0,label:'Blacksmithing'},arms:{xp:0,label:'Arms'},vigor:{xp:0,label:'Vigor'},vitality:{xp:0,label:'Vitality'}};
function getLv(k){return levelFromXp(SKILLS[k].xp);}
function addXp(k,a){const s=SKILLS[k];const b=levelFromXp(s.xp);s.xp+=a;if(levelFromXp(s.xp)>b)toast(s.label+' level '+levelFromXp(s.xp)+'!');if(panelTab==='skills')renderPanel();}

const ray=new THREE.Raycaster(); const ndc=new THREE.Vector2();
function pick(cx,cy){ndc.x=(cx/W())*2-1;ndc.y=-(cy/H())*2+1;ray.setFromCamera(ndc,cam);const meshes=ents.filter(e=>!(e.type==='mob'&&e.dead)).map(e=>e.mesh);const hit=ray.intersectObjects(meshes,true);if(hit.length){let o=hit[0].object;while(o&&!o.userData.ent)o=o.parent;if(o&&o.userData.ent){engage(o.userData.ent);return;}}const g=ray.intersectObject(ground);if(g.length){player.target=g[0].point.clone();player.target.y=0;player.action=null;}}
function engage(e){const dir=e.pos.clone().sub(player.pos);dir.y=0;const R=e.type==='mob'?1.4:1.7;dir.normalize();player.target=e.pos.clone().sub(dir.multiplyScalar(R));player.target.y=0;player.action={kind:'pending',e};}
function near(e,R){return Math.hypot(player.pos.x-e.pos.x,player.pos.z-e.pos.z)<=R;}

const ptrs=new Map(); let pinchD=0,lastMid=null,downPtr=null;
dom.addEventListener('pointerdown',e=>{e.preventDefault();ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY,button:e.button});
  if(ptrs.size===1)downPtr={id:e.pointerId,x:e.clientX,y:e.clientY,button:e.button,moved:false};
  else if(ptrs.size===2){const v=[...ptrs.values()];pinchD=Math.hypot(v[0].x-v[1].x,v[0].y-v[1].y);lastMid={x:(v[0].x+v[1].x)/2,y:(v[0].y+v[1].y)/2};downPtr=null;}
},{passive:false});
dom.addEventListener('pointermove',e=>{const p=ptrs.get(e.pointerId);if(!p)return;const px=p.x,py=p.y;p.x=e.clientX;p.y=e.clientY;
  if(ptrs.size>=2){const v=[...ptrs.values()];const d=Math.hypot(v[0].x-v[1].x,v[0].y-v[1].y);if(pinchD)zoom((pinchD-d)*0.06);pinchD=d;const mid={x:(v[0].x+v[1].x)/2,y:(v[0].y+v[1].y)/2};if(lastMid)rotate((mid.x-lastMid.x)*camCtl.sens,-(mid.y-lastMid.y)*camCtl.sens);lastMid=mid;}
  else if(ptrs.size===1){if(downPtr&&e.pointerId===downPtr.id&&Math.hypot(e.clientX-downPtr.x,e.clientY-downPtr.y)>8)downPtr.moved=true;if(p.button===2||p.button===1)rotate((e.clientX-px)*camCtl.sens,-(e.clientY-py)*camCtl.sens);}
},{passive:false});
function ptrUp(e){const wasTap=downPtr&&e.pointerId===downPtr.id&&!downPtr.moved&&downPtr.button===0;const cx=e.clientX,cy=e.clientY;ptrs.delete(e.pointerId);if(ptrs.size<2){pinchD=0;lastMid=null;}if(ptrs.size===0&&wasTap)pick(cx,cy);downPtr=null;}
dom.addEventListener('pointerup',ptrUp); dom.addEventListener('pointercancel',e=>{ptrs.delete(e.pointerId);if(ptrs.size<2){pinchD=0;lastMid=null;}});

const TICK=400; let acc=0;
function tick(){const a=player.action;const fighting=a&&a.kind==='attack'&&a.e&&!a.e.dead;if(!fighting&&player.hp<player.maxHp){player.hp=Math.min(player.maxHp,player.hp+1);syncHud();}if(!a)return;
  if(a.kind==='pending'){if(player.target&&player.pos.distanceTo(player.target)>0.4)return;start(a.e);return;}const e=a.e;
  if(a.kind==='chop'){if(!near(e,2)||e.depleted){if(e.depleted)player.action=null;return;}if(Math.random()<0.4+getLv('forestry')*0.02){if(addItem('oak_log',1)){addXp('forestry',42);toast('+1 Oak Log');}if(Math.random()<0.22)deplete(e);}}
  else if(a.kind==='mine'){if(!near(e,2)||e.depleted){if(e.depleted)player.action=null;return;}if(getLv('prospecting')<e.mineLv){toast('Requires Prospecting '+e.mineLv+'.');player.action=null;return;}if(Math.random()<0.4+getLv('prospecting')*0.015){const out=e.metal+'_ore';if(addItem(out,1)){addXp('prospecting',26);toast('+1 '+ITEMS[out].name);}if(Math.random()<0.25)deplete(e);}}
  else if(a.kind==='attack')combat(e);}
function deplete(e){e.depleted=true;e.mesh.visible=false;e.respawn=performance.now()+7000;player.action=null;}
function start(e){if(e.type==='tree'||e.type==='darktree')player.action={kind:'chop',e};else if(e.type==='rock')player.action={kind:'mine',e};else if(e.type==='furnace'){openMenu('smelt');player.action=null;}else if(e.type==='anvil'){openMenu('forge');player.action=null;}else if(e.type==='mob'){e.engaged=true;player.action={kind:'attack',e};}else if(e.type==='npc'){talk(e);player.action=null;}else if(e.type==='wayshrine'){toast('The wayshrine hums, dormant for now.');player.action=null;}else if(e.type==='stall'){toast('The Coronation Market — coming with the server.');player.action=null;}else if(e.type==='house'){toast('A sturdy house, shuttered for now.');player.action=null;}}
function combat(e){if(e.dead){player.action=null;return;}if(!near(e,1.9))return;const aLv=getLv('arms');const def=e.def!=null?e.def:(e.brute?8:4);
  if(Math.random()<clamp(.6+(aLv-def)*.02,.25,.92)){const d=1+Math.floor(Math.random()*maxHit());e.hp=Math.max(0,e.hp-d);addXp('arms',4*d);addXp('vigor',4*d);addXp('vitality',2*d);flash(e);if(e.hp<=0){kill(e);return;}}
  const eAtk=e.atk!=null?e.atk:(e.brute?12:2); const eDmg=e.dmgMax!=null?e.dmgMax:(e.brute?7:4);
  if(Math.random()<clamp(.6+(eAtk-aLv)*.02,.25,.92)){let d=1+Math.floor(Math.random()*eDmg);player.hp=Math.max(0,player.hp-d);addXp('vitality',d);syncHud();if(player.hp<=0)die();}}
function kill(e){e.dead=true;e.engaged=false;e.mesh.visible=false;e.respawn=performance.now()+(e.brute?15000:8000);player.action=null;
  const range=e.coinRange||(e.brute?[8,14]:[2,4]);const c=rint(range[0],range[1]);coins+=c;syncHud();toast('+'+c+' coins');
  const dropId=e.drop||(!e.brute&&!e.wolf?'ashrat_tail':null); if(dropId&&Math.random()<0.35){addItem(dropId,1);toast('+1 '+(ITEMS[dropId]?ITEMS[dropId].name:dropId));}}
function die(){player.action=null;player.target=null;player.hp=Math.round(player.maxHp*0.5);player.pos.set(0,0,0);toast('You were felled. Waking at the hearth…');syncHud();}
function talk(e){if(!e.talked){e.talked=true;coins+=10;syncHud();toast(e.greet||(e.name+': "Take these 10 marks, stranger."'));}else toast(e.line||(e.name+': "Safe travels, stranger."'));}
function flash(e){e.mesh.traverse(o=>{if(o.material&&o.material.emissive){o.material.emissive.setHex(0x884422);setTimeout(()=>o.material.emissive.setHex(0),140);}});}
function rint(a,b){return a+Math.floor(Math.random()*(b-a+1));}

const clock=new THREE.Clock();
function animate(){requestAnimationFrame(animate);const dt=Math.min(0.05,clock.getDelta());
  if(player.target){const d=player.pos.distanceTo(player.target);if(d>0.05){const step=Math.min(d,5*dt);player.pos.add(player.target.clone().sub(player.pos).setY(0).normalize().multiplyScalar(step));const ang=Math.atan2(player.target.x-player.pos.x,player.target.z-player.pos.z);playerMesh.rotation.y=ang;}}
  playerMesh.position.copy(player.pos);
  for(const e of ents){if(e.respawn&&performance.now()>=e.respawn){if(e.type==='mob'){e.dead=false;e.hp=e.maxHp;e.pos.copy(e.home);e.mesh.position.copy(e.home);}else e.depleted=false;e.mesh.visible=true;e.respawn=0;}}
  acc+=dt*1000;while(acc>=TICK){acc-=TICK;tick();}
  sun.position.copy(player.pos).add(sunOffset); sun.target.position.copy(player.pos); sun.target.updateMatrixWorld();
  updateAmbience(player.pos.x);
  const reg=regionAt(player.pos.x); if(reg!==currentRegion){ currentRegion=reg; showZoneBanner(reg.name,reg.sub); }
  updateCam(); renderer.render(scene,cam);}
animate();

      <div id="loaderNote">${GLTF?'Pick a type, choose a .glb. To auto-load on every device, host on GitHub Pages and set MODEL_URLS at the top of the file.':'GLB loading needs this hosted (GitHub Pages) or opened in a real browser tab. The game still runs with placeholders.'}</div>`;
    if(GLTF){const fi=document.getElementById('mFile');fi.addEventListener('change',e=>{if(e.target.files[0])loadGLBFile(e.target.files[0],document.getElementById('mType').value);});}}
  else if(panelTab==='help'){pTitle.textContent='Guide';pHint.textContent='Ashford 3D';pBody.innerHTML=`<div class="help"><b>Tap ground</b> to walk · <b>tap things</b> to use them.
    <ul><li>📷 Camera: pinch / wheel to zoom, two-finger or right-drag to rotate, arrows on PC, or the buttons on the right.</li>
    <li>🛤️ Follow the road: <b>west</b> to Greenveil (Deepwood), <b>east</b> to Havenport (Borderlands) — one seamless map, no loading screens.</li>
    <li>⛏️ Mine copper + tin → 🔥 furnace smelts <b>1 copper + 1 tin = Bronze Bar</b>. Iron needs Prospecting 5.</li>
    <li>⚒️ Anvil forges bronze/iron weapons — tap a weapon in Pack to wield.</li>
    <li>🐀 Ashrats roam Ashford/Havenport; 🟥 Brute hits hard. 🐺 Shadow Wolves haunt Greenveil and drop Wolf Pelts.</li>
    <li>🏪 Havenport's stall previews the Coronation Market; its wayshrine and Greenveil's are dormant until the server's live.</li>
    <li>🎨 Models tab loads your real GLBs — now with categories for both towns.</li></ul>
    Three towns, one road, one map. Armor and the full metal ladder port in next.</div>`;}
}
function syncCamUI(){const g=id=>document.getElementById(id);if(!g('sZoom'))return;g('sZoom').value=camCtl.dist;g('vZoom').textContent=Math.round(camCtl.dist);g('sPitch').value=camCtl.pitch;g('vPitch').textContent=camCtl.pitch.toFixed(2);g('sYaw').value=camCtl.yaw;g('vYaw').textContent=camCtl.yaw.toFixed(2);g('sSens').value=camCtl.sens;g('vSens').textContent=camCtl.sens.toFixed(3);g('tFollow').textContent=camCtl.follow?'On':'Off';g('tShadow').textContent=sun.castShadow?'On':'Off';}
function smelt(out){const r=SMELTS.find(x=>x.out===out);if(!r||getLv('blacksmithing')<r.lv||!r.inputs.every(([id,n])=>invCount(id)>=n)){toast('Missing materials or level.');return;}r.inputs.forEach(([id,n])=>removeItem(id,n));addItem(out,1);addXp('blacksmithing',r.xp);toast('Smelted '+ITEMS[out].name);renderPanel();}
function forge(out){const r=RECIPES.find(x=>x.out===out);if(!r||getLv('blacksmithing')<r.lv||invCount(r.bar)<r.bars){toast('Need more bars or level.');return;}removeItem(r.bar,r.bars);addItem(out,1);addXp('blacksmithing',r.xp);toast('Forged '+ITEMS[out].name);renderPanel();}

// ---------- GLB loading + auto-fit ----------
const customModels={};
function fitWrap(proto,targetH){const wrap=new THREE.Group();const inst=proto.clone(true);wrap.add(inst);inst.updateMatrixWorld(true);let box=new THREE.Box3().setFromObject(inst);let size=new THREE.Vector3();box.getSize(size);const s=targetH/Math.max(size.y,0.001);inst.scale.multiplyScalar(s);inst.updateMatrixWorld(true);box=new THREE.Box3().setFromObject(inst);const c=new THREE.Vector3();box.getCenter(c);inst.position.x-=c.x;inst.position.z-=c.z;inst.position.y-=box.min.y;inst.traverse(o=>{o.castShadow=true;o.receiveShadow=true;});return wrap;}
function applyModel(type){const proto=customModels[type];if(!proto)return;
  if(type==='player'){const w=fitWrap(proto,TARGET_H.player);scene.remove(playerMesh);w.position.copy(player.pos);playerMesh=w;scene.add(playerMesh);return;}
  for(const e of ents){ const matches = type==='mob' ? (e.type==='mob'&&!e.wolf) : type==='wolf' ? (e.type==='mob'&&e.wolf) : e.type===type;
    if(matches){const th=TARGET_H[type]*(e.brute?1.5:1);const w=fitWrap(proto,th);w.position.copy(e.pos);w.traverse(o=>{o.userData.ent=e;});scene.remove(e.mesh);scene.add(w);e.mesh=w;if(e.dead||e.depleted)w.visible=false;}}}
function loadGLBFile(file,type){if(!GLTF)return;const url=URL.createObjectURL(file);GLTF.load(url,g=>{customModels[type]=g.scene;applyModel(type);toast('Loaded '+file.name);URL.revokeObjectURL(url);},undefined,err=>{toast('Failed to load model.');console.error(err);});}
if(GLTF){for(const type in MODEL_URLS){const u=MODEL_URLS[type];if(u)GLTF.load(u,g=>{customModels[type]=g.scene;applyModel(type);},undefined,()=>{});}}

syncHud();
setTimeout(()=>toast('Pinch/wheel to zoom · drag to rotate · tap to move.'),1200);
}
</script>
